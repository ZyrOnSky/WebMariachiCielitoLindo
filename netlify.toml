[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Firebase public API keys (AIza*) are intentionally public and protected
  # by domain restrictions in Firebase Console — not actual secrets.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
