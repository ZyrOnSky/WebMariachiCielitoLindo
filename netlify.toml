[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # Firebase public config keys (AIza*) are intentionally public —
  # protected by domain restrictions in Firebase Console, not by secrecy.
  # Disabling Netlify's smart detection to prevent false positives.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
